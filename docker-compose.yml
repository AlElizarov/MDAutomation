services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
